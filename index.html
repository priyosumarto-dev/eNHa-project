<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Renovasi Rumah</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --accent: #c17f3b;
    --accent2: #7a5c2e;
    --text: #2a2015;
    --muted: #8a7a60;
    --border: #e0d5c0;
    --danger: #c0392b;
    --success: #27776b;
    --row-even: #fdf8ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--text);
    color: var(--bg);
    padding: 28px 32px 24px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.15;
  }

  header .icon { font-size: 2.6rem; line-height: 1; }

  header .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.65rem;
    letter-spacing: -0.5px;
    color: #fff;
  }

  header .title-block p {
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .container { max-width: 820px; margin: 0 auto; padding: 0 20px; }

  /* SUMMARY CARDS */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 24px 0 20px;
  }

  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .summary-card.danger::after { background: var(--danger); }
  .summary-card.success::after { background: var(--success); }

  .summary-card .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .summary-card .amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--text);
    word-break: break-word;
  }

  .summary-card.danger .amount { color: var(--danger); }
  .summary-card.success .amount { color: var(--success); }

  /* FORM */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 24px 20px;
    margin-bottom: 24px;
  }

  .form-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }

  .field label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .field input, .field select, .field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(193,127,59,0.12);
  }

  .field textarea { resize: vertical; min-height: 64px; }

  .btn-submit {
    margin-top: 16px;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-submit:hover { background: var(--accent2); }
  .btn-submit:active { transform: scale(0.98); }

  /* TABLE */
  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .table-header {
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .table-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-export {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 14px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }

  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  .filter-bar {
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-bar select, .filter-bar input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--text);
    outline: none;
    flex: 1; min-width: 120px;
  }

  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }

  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

  thead tr { background: var(--text); color: #fff; }
  thead th {
    padding: 11px 14px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: #f0e8d4; }

  tbody td { padding: 10px 14px; vertical-align: top; }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .badge-material { background: #fde8c4; color: #7a4a0a; }
  .badge-jasa { background: #d4eaf5; color: #1a5a7a; }
  .badge-peralatan { background: #e4d4f5; color: #4a1a7a; }
  .badge-lainnya { background: #e8e8e8; color: #444; }

  .amount-cell { font-family: 'Playfair Display', serif; font-weight: 600; color: var(--accent2); }

  .btn-del {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .btn-del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.85rem; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 12px 24px;
    border-radius: 99px;
    font-size: 0.82rem;
    font-weight: 500;
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 580px) {
    .form-grid { grid-template-columns: 1fr; }
    .summary-bar { grid-template-columns: 1fr; }
    thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
    .table-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="icon">🏠</div>
  <div class="title-block">
    <h1>Catatan Renovasi Rumah</h1>
    <p>Pencatatan Pengeluaran</p>
  </div>
</header>

<div class="container">

  <!-- SUMMARY -->
  <div class="summary-bar">
    <div class="summary-card">
      <div class="label">Total Anggaran</div>
      <div class="amount" id="totalBudget">Rp 0</div>
    </div>
    <div class="summary-card danger">
      <div class="label">Total Pengeluaran</div>
      <div class="amount" id="totalSpent">Rp 0</div>
    </div>
    <div class="summary-card success">
      <div class="label">Sisa Anggaran</div>
      <div class="amount" id="totalSisa">Rp 0</div>
    </div>
  </div>

  <!-- BUDGET INPUT -->
  <div class="form-card" style="margin-bottom:16px;">
    <div class="form-grid">
      <div class="field full">
        <label>💰 Total Anggaran Renovasi</label>
        <input type="text" id="budgetInput" placeholder="Masukkan total anggaran, contoh: 50000000" oninput="formatBudgetInput(this)" onblur="saveBudget()">
      </div>
    </div>
  </div>

  <!-- FORM TAMBAH -->
  <div class="form-card">
    <h2>➕ Tambah Pengeluaran</h2>
    <div class="form-grid">
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="fTanggal">
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="fKategori">
          <option value="">-- Pilih --</option>
          <option value="material">🧱 Material</option>
          <option value="jasa">👷 Jasa Tukang</option>
          <option value="peralatan">🔧 Peralatan</option>
          <option value="lainnya">📦 Lainnya</option>
        </select>
      </div>
      <div class="field full">
        <label>Nama Item / Deskripsi</label>
        <input type="text" id="fItem" placeholder="contoh: Semen 50 sak, Cat tembok, dll">
      </div>
      <div class="field">
        <label>Jumlah (Rp)</label>
        <input type="text" id="fJumlah" placeholder="0" oninput="formatInput(this)">
      </div>
      <div class="field">
        <label>Toko / Vendor</label>
        <input type="text" id="fToko" placeholder="Nama toko atau vendor (opsional)">
      </div>
      <div class="field full">
        <label>Catatan</label>
        <textarea id="fCatatan" placeholder="Catatan tambahan (opsional)"></textarea>
      </div>
    </div>
    <button class="btn-submit" onclick="addEntry()">Simpan Pengeluaran</button>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <h2>📋 Riwayat Pengeluaran</h2>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="filter-bar">
      <select id="filterKat" onchange="renderTable()">
        <option value="">Semua Kategori</option>
        <option value="material">Material</option>
        <option value="jasa">Jasa Tukang</option>
        <option value="peralatan">Peralatan</option>
        <option value="lainnya">Lainnya</option>
      </select>
      <input type="text" id="filterSearch" placeholder="🔍 Cari item..." oninput="renderTable()">
    </div>
    <div id="tableWrapper">
      <div class="empty-state">
        <div class="icon">🔨</div>
        <p>Belum ada data pengeluaran.<br>Tambahkan entri pertama kamu!</p>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let entries = JSON.parse(localStorage.getItem('renovasi_entries') || '[]');
  let budget = parseInt(localStorage.getItem('renovasi_budget') || '0');

  // Init
  window.onload = () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fTanggal').value = today;
    if (budget > 0) {
      document.getElementById('budgetInput').value = formatRibuan(budget);
    }
    updateSummary();
    renderTable();
  };

  function formatRibuan(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  function parseRibuan(s) {
    return parseInt(s.replace(/\./g, '').replace(/[^\d]/g, '')) || 0;
  }

  function formatInput(el) {
    const val = parseRibuan(el.value);
    el.value = val > 0 ? formatRibuan(val) : '';
  }

  function formatBudgetInput(el) {
    const val = parseRibuan(el.value);
    el.value = val > 0 ? formatRibuan(val) : '';
  }

  function saveBudget() {
    budget = parseRibuan(document.getElementById('budgetInput').value);
    localStorage.setItem('renovasi_budget', budget);
    updateSummary();
  }

  function updateSummary() {
    const spent = entries.reduce((a, e) => a + e.jumlah, 0);
    const sisa = budget - spent;
    document.getElementById('totalBudget').textContent = 'Rp ' + formatRibuan(budget);
    document.getElementById('totalSpent').textContent = 'Rp ' + formatRibuan(spent);
    const sisaEl = document.getElementById('totalSisa');
    sisaEl.textContent = 'Rp ' + formatRibuan(Math.abs(sisa));
    sisaEl.parentElement.className = 'summary-card ' + (sisa < 0 ? 'danger' : 'success');
  }

  function addEntry() {
    const tanggal = document.getElementById('fTanggal').value;
    const kategori = document.getElementById('fKategori').value;
    const item = document.getElementById('fItem').value.trim();
    const jumlah = parseRibuan(document.getElementById('fJumlah').value);
    const toko = document.getElementById('fToko').value.trim();
    const catatan = document.getElementById('fCatatan').value.trim();

    if (!tanggal || !kategori || !item || !jumlah) {
      showToast('⚠️ Isi tanggal, kategori, item, dan jumlah!');
      return;
    }

    entries.unshift({ id: Date.now(), tanggal, kategori, item, jumlah, toko, catatan });
    localStorage.setItem('renovasi_entries', JSON.stringify(entries));

    // Reset form
    document.getElementById('fKategori').value = '';
    document.getElementById('fItem').value = '';
    document.getElementById('fJumlah').value = '';
    document.getElementById('fToko').value = '';
    document.getElementById('fCatatan').value = '';

    updateSummary();
    renderTable();
    showToast('✅ Pengeluaran berhasil disimpan!');
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    localStorage.setItem('renovasi_entries', JSON.stringify(entries));
    updateSummary();
    renderTable();
    showToast('🗑 Data dihapus');
  }

  function renderTable() {
    const kat = document.getElementById('filterKat').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();
    let filtered = entries.filter(e => {
      return (!kat || e.kategori === kat) &&
             (!search || e.item.toLowerCase().includes(search) || (e.toko||'').toLowerCase().includes(search));
    });

    const wrapper = document.getElementById('tableWrapper');
    if (filtered.length === 0) {
      wrapper.innerHTML = `<div class="empty-state"><div class="icon">🔨</div><p>Belum ada data${kat||search ? ' untuk filter ini' : ''}.</p></div>`;
      return;
    }

    const badgeMap = {
      material: 'badge-material', jasa: 'badge-jasa',
      peralatan: 'badge-peralatan', lainnya: 'badge-lainnya'
    };
    const labelMap = {
      material: '🧱 Material', jasa: '👷 Jasa',
      peralatan: '🔧 Alat', lainnya: '📦 Lainnya'
    };

    const rows = filtered.map(e => `
      <tr>
        <td>${formatTanggal(e.tanggal)}</td>
        <td><span class="badge ${badgeMap[e.kategori]||'badge-lainnya'}">${labelMap[e.kategori]||e.kategori}</span></td>
        <td>
          <strong>${e.item}</strong>
          ${e.toko ? `<br><small style="color:var(--muted)">${e.toko}</small>` : ''}
          ${e.catatan ? `<br><small style="color:var(--muted);font-style:italic">${e.catatan}</small>` : ''}
        </td>
        <td class="amount-cell">Rp ${formatRibuan(e.jumlah)}</td>
        <td><button class="btn-del" onclick="deleteEntry(${e.id})" title="Hapus">✕</button></td>
      </tr>
    `).join('');

    wrapper.innerHTML = `
      <table>
        <thead><tr>
          <th>Tanggal</th><th>Kategori</th><th>Item</th><th>Jumlah</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function formatTanggal(str) {
    if (!str) return '-';
    const [y, m, d] = str.split('-');
    const bln = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
    return `${parseInt(d)} ${bln[parseInt(m)-1]} ${y}`;
  }

  function exportCSV() {
    if (entries.length === 0) { showToast('⚠️ Tidak ada data untuk diekspor'); return; }
    const header = 'Tanggal,Kategori,Item,Toko,Jumlah,Catatan\n';
    const rows = entries.map(e =>
      `${e.tanggal},${e.kategori},"${e.item}","${e.toko||''}",${e.jumlah},"${e.catatan||''}"`
    ).join('\n');
    const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'renovasi_rumah.csv';
    a.click();
    showToast('📥 CSV berhasil diunduh!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
